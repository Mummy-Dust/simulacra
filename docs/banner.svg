<svg viewBox="0 0 900 260" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="SIMULACRA - modular ESP32 anti-tracking decoy swarm">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="75%">
      <stop offset="0%" stop-color="#0c1512"/>
      <stop offset="60%" stop-color="#070a0b"/>
      <stop offset="100%" stop-color="#040506"/>
    </radialGradient>
    <linearGradient id="txt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c8ffe0"/>
      <stop offset="45%" stop-color="#33ff90"/>
      <stop offset="100%" stop-color="#12a866"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-90%" width="180%" height="280%">
      <feGaussianBlur stdDeviation="3" result="b1"/>
      <feGaussianBlur stdDeviation="8.5" result="b2"/>
      <feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="scan" width="3" height="3" patternUnits="userSpaceOnUse">
      <rect width="3" height="1" fill="#22ffa0" opacity="0.05"/>
    </pattern>
  </defs>

  <rect width="900" height="260" fill="url(#bg)"/>
  <rect width="900" height="260" fill="url(#scan)"/>

  <!-- terminal frame + corner ticks -->
  <rect x="10" y="10" width="880" height="240" fill="none" stroke="#17402f" stroke-width="1.5"/>
  <g stroke="#33ff90" stroke-width="2" opacity="0.7">
    <path d="M10 26 V10 H26"/><path d="M874 10 H890 V26"/>
    <path d="M10 234 V250 H26"/><path d="M874 250 H890 V234"/>
  </g>
  <text x="26" y="34" font-family="'Consolas','DejaVu Sans Mono',monospace" font-size="12" letter-spacing="1.5" fill="#33cc85" opacity="0.9">root@simulacra:~# ./summon --crowd&#160;<tspan fill="#33ff90">&#9608;</tspan></text>
  <text x="874" y="34" text-anchor="end" font-family="'Consolas','DejaVu Sans Mono',monospace" font-size="12" letter-spacing="1.5" fill="#2f8f66" opacity="0.9">[ ble &#183; wifi &#183; esp-now ]</text>

  <!-- radar-ping sigils (drawn circles, render anywhere) -->
  <g fill="none" stroke="#33ff90">
    <circle cx="104" cy="134" r="27" stroke-width="1" opacity="0.16"/>
    <circle cx="104" cy="134" r="19" stroke-width="1.2" opacity="0.3"/>
    <circle cx="104" cy="134" r="11" stroke-width="1.4" opacity="0.5" filter="url(#glow)"/>
    <circle cx="104" cy="134" r="3.2" fill="#33ff90" stroke="none" filter="url(#glow)"/>
  </g>
  <g fill="none" stroke="#9d4edd">
    <circle cx="796" cy="134" r="27" stroke-width="1" opacity="0.16"/>
    <circle cx="796" cy="134" r="19" stroke-width="1.2" opacity="0.3"/>
    <circle cx="796" cy="134" r="11" stroke-width="1.4" opacity="0.5" filter="url(#glow)"/>
    <circle cx="796" cy="134" r="3.2" fill="#b06bff" stroke="none" filter="url(#glow)"/>
  </g>

  <!-- glitch RGB-split name: magenta + cyan channels behind, neon-green on top -->
  <g font-family="'Consolas','DejaVu Sans Mono',monospace" font-size="82" font-weight="bold" letter-spacing="8" text-anchor="middle">
    <text x="454" y="146" fill="#ff2e97" opacity="0.55">SIMULACRA</text>
    <text x="446" y="145" fill="#29e0ff" opacity="0.55">SIMULACRA</text>
    <text x="450" y="145" fill="url(#txt)" filter="url(#glow)">SIMULACRA</text>
  </g>

  <!-- divider + dagger -->
  <g stroke="#1f6b4c" stroke-width="1.3" opacity="0.9">
    <line x1="250" y1="176" x2="432" y2="176"/><line x1="468" y1="176" x2="650" y2="176"/>
  </g>
  <text x="450" y="182" text-anchor="middle" font-family="monospace" font-size="18" fill="#33ff90" opacity="0.9" filter="url(#glow)">&#8224;</text>

  <!-- taglines -->
  <text x="450" y="210" text-anchor="middle" font-family="'Consolas','DejaVu Sans Mono',monospace" font-size="17" letter-spacing="5" fill="#68f2ac" opacity="0.94">summon the crowd &#183; bury the signal</text>
  <text x="450" y="234" text-anchor="middle" font-family="'Consolas','DejaVu Sans Mono',monospace" font-size="11.5" letter-spacing="3" fill="#37946a" opacity="0.85">a modular esp32 anti-tracking decoy swarm</text>
</svg>
